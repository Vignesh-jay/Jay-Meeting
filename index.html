<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JΛY Meeting</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <header>

        <div class="logo">

            JM

        </div>

        <h1>JΛY Meeting</h1>

        <p>Meet Smarter. Decide Faster.</p>

    </header>

    <section class="card">

        <h2>Meeting Information</h2>

        <label>Meeting Title</label>

        <input id="title"
               type="text"
               placeholder="Weekly IT Review">

        <label>Department</label>

        <input id="department"
               type="text"
               placeholder="IT Infrastructure">

        <label>Meeting Date</label>

        <input id="date"
               type="date">

        <label>Transcript</label>

        <textarea
            id="transcript"
            placeholder="Paste Microsoft Teams transcript here..."></textarea>

        <button id="generate">

            ✨ Generate Meeting Minutes

        </button>

    </section>

    <section class="card">

        <div class="result-header">

            <h2>Meeting Minutes</h2>

            <button id="copyBtn">

                📋 Copy

            </button>

        </div>

        <div id="result">

            Meeting Minutes will appear here...

        </div>

    </section>

</div>

<script src="js/app.js"></script>

</body>

</html>
