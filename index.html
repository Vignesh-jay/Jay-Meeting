<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JΛY Meeting</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <header>

        <div class="logo">

            JM

        </div>

        <h1>JΛY Meeting</h1>

        <p>Meet Smarter. Decide Faster.</p>

    </header>

    <section class="card">

        <h2>Meeting Information</h2>

        <label>Meeting Title</label>

        <input id="title"
               type="text"
               placeholder="Weekly IT Review">

        <label>Department</label>

        <input id="department"
               type="text"
               placeholder="IT Infrastructure">

        <label>Meeting Date</label>

        <input id="date"
               type="date">

        <label>Attendees</label>

            <textarea
                id="attendees"
                rows="4"
                placeholder="One attendee per line&#10;Vignesh Jayaraman&#10;Dinesh&#10;John"></textarea>

        <label>Transcript</label>

        <textarea
            id="transcript"
            placeholder="Paste Microsoft Teams transcript here..."></textarea>

        <div class="button-group">

            <button id="clearForm">

                🗑 Clear

            </button>

            <button id="saveDraft">

                💾 Save Draft

            </button>

            <button id="generate">

                ✨ Generate Meeting Minutes

            </button>

        </div>

    </section>

    <section class="card">

        <div class="result-header">

            <h2>Meeting Minutes</h2>

            <div>

                <button id="copyBtn">

                    📋 Copy

                </button>

                <button id="downloadHtml">

                    🌐 HTML

                </button>

                <button id="downloadMd">

                    📝 Markdown

                </button>

            </div>

        </div>

        <div id="stats"></div>

        <hr style="margin:20px 0;">

        <div id="result">

            Meeting Minutes will appear here...

        </div>

    </section>
    <section class="card">

        <details>

            <summary>⚙ Engine Debug</summary>

            <pre id="debugPanel">

    Waiting...

            </pre>

        </details>

    </section>

</div>

<script src="js/classifier.js"></script>

<script src="js/speaker.js"></script>

<script src="js/engine/topicDetector.js"></script>

<script src="js/engine/meetingEngine.js"></script>

<script src="js/parser.js"></script>

<script src="js/app.js"></script>

</body>

</html>
